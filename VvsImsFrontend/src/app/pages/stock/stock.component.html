<div *ngIf="isLoading; else content">
    <ngx-skeleton-loader count="3" appearance="line"></ngx-skeleton-loader>
</div>
<ng-template #content>
   <div class="row g-2 align-items-center mb-2">
        <!-- Manage Columns Dropdown -->
        <div class="col-12 col-md-3">
            <div class="multi-select w-100">
                <div class="select-box" (click)="dropdownOpen = !dropdownOpen">
                    <span class="placeholder">Manage Columns</span>
                    <span class="arrow">▾</span>
                </div>
                <div class="options" *ngIf="dropdownOpen">
                    <div class="option-item" *ngFor="let col of allColumns">
                        <label class="option-label">
                            <input type="checkbox" [checked]="col.visible" (change)="onColumnToggle(col.field, $event)">
                            <span>{{ col.headerName }}</span>
                        </label>
                    </div>
                </div>
            </div>
        </div>

        <!-- Search Field -->
        <div class="col-12 col-md-3">
            <input type="text" class="form-control" placeholder="Search inventory..."
                (input)="onQuickFilterChanged($event)" style="height: 42px;border-radius: 0px;" />
        </div>
    </div>

    <ag-grid-angular class="ag-theme-alpine" style="width: 100%; height: 700px;" [rowData]="listProducts"
        [theme]="'legacy'" [gridOptions]="gridOptions" [columnDefs]="colDefs" [defaultColDef]="defaultColDef" (gridReady)="onGridReady($event)" (cellClicked)="onCellClicked($event)"
        [pagination]="true" [paginationPageSize]="50">
    </ag-grid-angular>

<ng-template #modalTemplate let-modal>

    <div class="modal-header p-3 bg-light">
        <h5 class="mb-0">Order#</h5>
        <button type="button" class="close cross" aria-label="Close" (click)="modal.dismiss('Cross click')"
            style="outline: none">
            <span aria-hidden="true" class="whitee">&times;</span>
        </button>
    </div>
    <form [formGroup]="orderForm" (ngSubmit)="onSubmitOrder()">
        <div class="modal-body">
            <div class="mb-3">
                <label for="Model" class="form-label fw-semibold mb-0">
                    Model
                </label>
                <input type="text" id="Model" formControlName="productTitle" class="form-control" readonly>
            </div>
            <div class="mb-3">
                <label for="IMEI" class="form-label fw-semibold mb-0">
                    IMEI
                </label>
                <input type="text" id="IMEI" formControlName="imei" class="form-control" readonly>
            </div>
            <!-- Order Number -->
            <div class="mb-3">
                <label for="orderNumber" class="form-label fw-semibold mb-0">
                    <i class="fa fa-list-ol me-2 text-secondary"></i> Order Number
                </label>
                <input type="text" id="orderNumber" formControlName="orderNo" class="form-control"
                    placeholder="Enter Order Number">
                <div *ngIf="orderForm.get('orderNo')?.invalid && orderForm.get('orderNo')?.touched"
                    class="text-danger small mt-1">
                    Order Number is required.
                </div>
            </div>
            <!-- Date -->
            <div class="mb-3">
                <label for="date" class="form-label fw-semibold mb-0">
                    <i class="fa fa-calendar me-2 text-secondary"></i> Date
                </label>
                <input type="date" id="date" formControlName="date" class="form-control">
                <div *ngIf="orderForm.get('date')?.invalid && orderForm.get('date')?.touched"
                    class="text-danger small mt-1">
                    Date is required.
                </div>
            </div>

            <!-- Submit Button -->
        </div>

        <div class="modal-footer bg-light">
            <button type="submit" class="btn btn-success" [disabled]="orderForm.invalid">
                <i class="fa fa-save me-2"></i> Submit
            </button>
            <button type="button" class="btn btn-danger" aria-label="Close" (click)="modal.dismiss('Cross click')"
                style="outline: none">
                <i class="fa fa-times"></i> Cancel
            </button>
        </div>
    </form>
</ng-template>
