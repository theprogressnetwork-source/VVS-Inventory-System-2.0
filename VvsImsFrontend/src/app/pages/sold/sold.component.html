<div *ngIf="isLoading; else content">
  <ngx-skeleton-loader count="3" appearance="line"></ngx-skeleton-loader>
</div>
<ng-template #content>
  <div class="row g-2 align-items-center mb-2">
    <!-- Search Field -->
    <div class="col-12 col-md-6">
      <input type="text" class="form-control" placeholder="Search inventory..." [(ngModel)]="searchText"
        (ngModelChange)="onQuickFilterChanged($event)" style="height: 42px; width: 70%; border-radius: 0px" />
    </div>

    <!-- Right Side Actions (Columns + Settings + Export) -->
    <div class="col-12 col-md-6 d-flex justify-content-md-end mt-2 mt-md-0">

      <!-- Columns Dropdown -->
      <div class="btn-group mr-2" ngbDropdown>
        <button class="btn btn-outline-info dropdown-toggle d-flex align-items-center px-3" ngbDropdownToggle
          style="border-radius: 0px; height: 40px">
          <i class="fa fa-columns me-2" style="font-size: 18px"></i>
          <span class="ml-2">Columns</span>
        </button>
        <div class="dropdown-menu dropdown-menu-right p-2" ngbDropdownMenu
          style="min-width: 200px; max-height: 300px; overflow-y: auto;">
          <div *ngFor="let col of allColumns" class="custom-control custom-checkbox mb-1">
            <input type="checkbox" class="custom-control-input" [id]="'col-' + col.field" [checked]="col.visible"
              (change)="onColumnToggle(col.field, $event)">
            <label class="custom-control-label" [for]="'col-' + col.field">{{ col.headerName }}</label>
          </div>
        </div>
      </div>

      <button class="btn btn-outline-secondary d-flex align-items-center px-3 mr-2"
        style="border-radius: 0px; height: 40px" (click)="openSettingsModal()">
        <i class="fa fa-cog me-2" style="font-size: 18px"></i>
        <span class="ml-2"> Settings </span>
      </button>

      <button class="btn btn-outline-success d-flex align-items-center px-3" style="border-radius: 0px; height: 40px"
        (click)="exportExcel()">
        <i class="fa fa-file-excel-o me-2" style="font-size: 18px"></i>
        <!-- <span class="ml-2">Export Excel</span> -->
        <span class="ml-2">Export</span>
      </button>
    </div>
  </div>

  <ag-grid-angular class="ag-theme-alpine" style="width: 100%; height: 700px" [rowData]="listProducts"
    [theme]="'legacy'" [gridOptions]="gridOptions" [columnDefs]="colDefs" [defaultColDef]="defaultColDef"
    (gridReady)="onGridReady($event)" (cellClicked)="onCellClicked($event)" [pagination]="true"
    [paginationPageSize]="50">
  </ag-grid-angular>

<ng-template #modalTemplate let-modal>
  <div class="modal-header p-3 bg-light">
    <h5 class="mb-0">Order#</h5>
    <button type="button" class="close cross" aria-label="Close" (click)="modal.dismiss('Cross click')"
      style="outline: none">
      <span aria-hidden="true" class="whitee">&times;</span>
    </button>
  </div>
  <form [formGroup]="orderForm">
    <div class="modal-body">
      <input type="hidden" formControlName="stockId" />

      <div class="mb-2">
        <label>SKU</label>
        <input class="form-control" formControlName="sku" readonly />
      </div>

      <div class="mb-2">
        <label>Order No</label>
        <input class="form-control" formControlName="returnOrderNo" readonly />
      </div>

      <div class="mb-2">
        <label>Reason</label>
        <select class="form-control" formControlName="reason">
          <option value="RETURN">Return</option>
          <option value="CANCEL">Cancel</option>
        </select>
      </div>

      <div class="mb-2">
        <label>Channel</label>
        <select class="form-control" formControlName="channel">
          <option value="">— Select —</option>
          <option value="Amazon">Amazon</option>
          <option value="Shopify">Shopify</option>
          <option value="Bestbuy">Bestbuy</option>
        </select>
      </div>

      <div class="mb-2">
        <label>IMEI</label>
        <input class="form-control" formControlName="imei" readonly />
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-primary mr-2" [disabled]="isSubmitting" (click)="submitReturn()">
        <!-- Spinner while loading -->
        <span *ngIf="isSubmitting" class="spinner-border spinner-border-sm me-2"></span>

        <!-- Icon when NOT loading -->
        <i *ngIf="!isSubmitting" class="fa fa-save me-2"></i>

        <!-- Text -->
        {{ isSubmitting ? "Submitting..." : "Submit" }}
      </button>
      <button type="button" class="btn btn-danger" data-bs-dismiss="modal" (click)="modal.dismiss('Cross click')">
        <i class="fa fa-times pr-2"></i> Cancel
      </button>
    </div>
  </form>
</ng-template>

<!-- Settings Modal Component -->
<app-settings-modal (resetColumns)="resetColumnsOnly()" (resetSearch)="resetSearchOnly()"
  (resetWidths)="resetWidthsOnly()" (resetAll)="resetSettings()"></app-settings-modal>
