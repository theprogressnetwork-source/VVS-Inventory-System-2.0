<div class="notification-bell position-relative">
  <!-- Notification Bell Button -->
  <button 
    class="btn btn-link p-0 position-relative border-0 bg-transparent"
    (click)="toggleNotifications($event)"
    aria-label="Notifications"
    [attr.aria-expanded]="notificationsOpen"
     style="font-size: 12px;box-shadow: none;">
    
    <i class="fa fa-bell fa-lg"></i>

    <!-- Unread Count Badge -->
    <span 
      *ngIf="unreadCount > 0"
      class="badge bg-danger rounded-pill position-absolute start-100 translate-middle"
      [class.badge-pulse]="unreadCount > 0"  [class.text-primary]="unreadCount > 0" style="right: -7px;top: -12px;">
      {{ unreadCount > 99 ? '99+' : unreadCount }}
    </span>
  </button>

  <!-- Notifications Dropdown Panel -->
  <div 
    *ngIf="notificationsOpen"
    class="notification-panel shadow-lg border-0 rounded-3"
    (click)="$event.stopPropagation()">
    
    <!-- Header -->
    <div class="notification-header bg-primary text-white rounded-top-3 p-3">
      <div class="d-flex justify-content-between align-items-center">
        <div>
          <h6 class="mb-0 fw-bold">
            <i class="fa fa-bell me-2"></i>
            Notifications
          </h6>
        </div>
        <div class="d-flex align-items-center gap-2">
          <span class="badge bg-white text-primary fs-7">{{ notifications.length }}</span>
          <button 
            class="btn btn-sm btn-light p-1 rounded-circle"
            (click)="refreshNotifications($event)"
            [disabled]="loading"
            aria-label="Refresh notifications" style="width: 25px;margin-left: 6px;">
            <i [class]="loading ? 'fa fa-spinner fa-spin' : 'fa fa-refresh'"></i>
          </button>
        </div>
      </div>
    </div>

    <!-- Notifications List -->
    <div class="notification-list">
      <div 
        *ngIf="notifications.length === 0"
        class="text-center text-muted py-5">
        <i class="fa fa-bell-slash fa-2x mb-3 opacity-50"></i>
        <p class="mb-0 small">No notifications yet</p>
        <small>We'll notify you when something arrives</small>
      </div>

      <div 
        *ngFor="let notification of notifications"
        class="notification-item border-bottom"
        [class.unread]="!notification.isRead"
        (click)="openNotification(notification, $event)">
        
        <div class="d-flex gap-3 p-3">
          <!-- Icon -->
          <div class="flex-shrink-0">
            <div class="notification-icon">
              <i [class]="getNotificationIcon(notification.type)"></i>
            </div>
          </div>

          <!-- Content -->
          <div class="flex-grow-1">
            <div class="d-flex justify-content-between align-items-start mb-1">
              <h6 class="notification-title mb-0" [class.fw-bold]="!notification.isRead">
                {{ notification.title }}
              </h6>
              <small class="text-muted ms-2">{{ notification.timeAgo }}</small>
            </div>
            
            <p class="notification-message text-muted small mb-2">
              {{ notification.message }}
            </p>
            
            <div class="d-flex justify-content-between align-items-center">
              <span class="badge badge-type bg-light text-dark fs-7">
                {{ notification.type }}
              </span>
              <span *ngIf="!notification.isRead" class="unread-dot bg-primary"></span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div *ngIf="notifications.length > 0" class="notification-footer p-3 border-top">
      <div class="row g-2">
        <div class="col-6">
          <button 
            class="btn btn-outline-secondary w-100 btn-sm"
            (click)="markAllRead($event)"
            [disabled]="unreadCount === 0">
            Mark All Read
          </button>
        </div>
        <div class="col-6">
          <button 
            class="btn btn-primary w-100 btn-sm"
            (click)="openAllNotifications()">
            View All
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
